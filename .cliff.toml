[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

Generated by [git-cliff](https://git-cliff.org/).
"""
body = """
{% if version %}
## [{{ version }}]] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="message") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
prerelease_selector = "beta"
tag_pattern = "v*"
ignore_tags = "v0.1.0"
output_template = """
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
"""

[[categories]]
conventionalcommits = "feat"
group = "Features"

[[categories]]
conventionalcommits = "fix"
group = "Bug Fixes"

[[categories]]
conventionalcommits = "perf"
group = "Performance Improvements"

[[categories]]
conventionalcommits = "refactor"
group = "Refactoring"

[[categories]]
conventionalcommits = "docs"
group = "Documentation"

[[categories]]
conventionalcommits = "test"
group = "Tests"

[[categories]]
conventionalcommits = "chore"
group = "Maintenance"

[[categories]]
conventionalcommits = "ci"
group = "CI/CD"
