name: council
version: 0.1.0
description: Multi-agent council for code review and architecture decisions
outputContract: v1

agents:
  - id: architect
    role: Architect
    context: repo-readonly
    modelHint: strong-reasoning
    focus:
      - architecture
      - design-patterns
      - code-structure

  - id: security
    role: Security
    context: repo-readonly
    modelHint: security-reasoning
    focus:
      - security
      - vulnerabilities
      - compliance

  - id: product
    role: Product
    context: prompt-only
    modelHint: balanced
    focus:
      - requirements
      - ux
      - business-value

  - id: delivery
    role: Delivery
    context: repo-readonly
    modelHint: practical-coding
    focus:
      - delivery
      - testing
      - deployment

  - id: data-ops
    role: DataOps
    context: repo-readonly
    modelHint: analytical
    focus:
      - data
      - pipelines
      - analytics

  - id: devil
    role: Devil
    context: repo-readonly
    modelHint: adversarial
    focus:
      - review
      - edge-cases
      - failure-modes