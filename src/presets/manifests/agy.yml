target: agy
entries:
  - src: agy/AGENTS.md
    dest: .agents/AGENTS.md
    strategy: merge-managed
    template: true
  - src: agy/rules
    dest: .agents/rules
    strategy: overwrite
    template: true
  - src: agy/workflows
    dest: .agents/workflows
    strategy: overwrite
    template: true
  - src: agy/settings.json
    dest: .agents/../antigravity-cli/settings.json
    strategy: skip
    globalStrategy: merge-json
  - src: agy/hooks.json
    dest: .agents/hooks.json
    strategy: overwrite
  - src: agy/mcp_config.json
    dest: .agents/mcp_config.json
    strategy: overwrite
  - src: agy/scripts
    dest: .agents/scripts
    strategy: overwrite
  - src: opencode/skills
    dest: .agents/skills
    strategy: overwrite
  - src: agy/skills
    dest: .agents/skills
    strategy: overwrite
    template: true

  - src: opencode/agents
    dest: .agents/agents
    strategy: overwrite
    template: true
  - src: opencode/prompts/v0.3.0
    dest: .agents/prompts/v0.3.0
    strategy: overwrite
    template: true

