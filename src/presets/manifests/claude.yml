target: claude
entries:
  - src: claude/CLAUDE.md
    dest: .claude/CLAUDE.md
    strategy: overwrite
    globalStrategy: append
    template: true
  - src: claude/settings.json
    dest: .claude/settings.json
    strategy: overwrite
    globalStrategy: merge-json
  - src: claude/claude.json
    dest: .claude.json
    strategy: merge-json
    globalStrategy: merge-json
  - src: claude/commands
    dest: .claude/commands
    strategy: overwrite
  - src: claude/skills
    dest: .claude/skills
    strategy: overwrite
  - src: opencode/agents
    dest: .claude/agents
    strategy: overwrite
    template: true
  - src: opencode/prompts/v0.3.0
    dest: .claude/prompts/v0.3.0
    strategy: overwrite
    template: true
